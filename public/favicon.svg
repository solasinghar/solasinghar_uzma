<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="#FAF6F0" stroke="#7B1C2A" stroke-width="1"/>

  <!-- Outer star points (burgundy) -->
  <g fill="#7B1C2A">
    <!-- Top point -->
    <polygon points="50,8 56,28 77,28 62,41 68,61 50,48 32,61 38,41 23,28 44,28"/>
  </g>

  <!-- Inner ornamental circle -->
  <circle cx="50" cy="50" r="20" fill="none" stroke="#D4AF37" stroke-width="1.5" opacity="0.8"/>

  <!-- Gold mehndi dots around center -->
  <g fill="#D4AF37" opacity="0.9">
    <circle cx="50" cy="25" r="2"/>
    <circle cx="65" cy="35" r="2"/>
    <circle cx="75" cy="50" r="2"/>
    <circle cx="65" cy="65" r="2"/>
    <circle cx="50" cy="75" r="2"/>
    <circle cx="35" cy="65" r="2"/>
    <circle cx="25" cy="50" r="2"/>
    <circle cx="35" cy="35" r="2"/>
  </g>

  <!-- Center gold circle -->
  <circle cx="50" cy="50" r="6" fill="#D4AF37"/>
  <circle cx="50" cy="50" r="4" fill="#7B1C2A"/>

  <!-- Small decorative petals -->
  <g fill="none" stroke="#D4AF37" stroke-width="0.8" opacity="0.7">
    <path d="M 50 50 Q 45 40 50 30" stroke-linecap="round"/>
    <path d="M 50 50 Q 60 45 70 50" stroke-linecap="round"/>
    <path d="M 50 50 Q 55 60 50 70" stroke-linecap="round"/>
    <path d="M 50 50 Q 40 55 30 50" stroke-linecap="round"/>
  </g>
</svg>
